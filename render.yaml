services:
  # ── Workflow Engine API (Web Service) ──────────────────────────
  - type: web
    name: workflow-engine-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workflow-engine-db
          property: connectionString
      - key: CONFIGS_DIR
        value: configs
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health/
    autoDeploy: true

  # ── PostgreSQL Database ─────────────────────────────────────────
databases:
  - name: workflow-engine-db
    plan: free
    databaseName: workflow_db
    user: workflow
